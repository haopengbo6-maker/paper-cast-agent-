/* ── Reset & Base ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #fef7f0;
  --card:      #fff8f3;
  --primary:   #e8957c;
  --secondary: #f4c7ab;
  --accent:    #d4694a;
  --text:      #4a3728;
  --muted:     #b8937a;
  --success:   #7cb88a;
  --border:    #e0c8b5;
  --pixel:     4px;
}

body {
  font-family: 'Pixel', 'SimHei', '微软雅黑', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 2rem 1rem;
  background-image:
    radial-gradient(circle, var(--secondary) 1px, transparent 1px);
  background-size: 24px 24px;
  background-position: 8px 8px;
}

.container {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* ── Pixel Card ────────────────────────────────────── */
.pixel-card {
  background: var(--card);
  border: var(--pixel) solid var(--border);
  box-shadow:
    var(--pixel) var(--pixel) 0 0 rgba(180,140,110,0.25),
    inset 0 0 0 2px rgba(255,255,255,0.5);
  padding: 1.5rem;
  position: relative;
}

/* ── Header ────────────────────────────────────────── */
.header {
  text-align: center;
  padding: 2rem 1rem;
}

.header-icon {
  font-size: 3rem;
  image-rendering: pixelated;
  display: block;
  margin-bottom: 0.5rem;
  animation: antenna-bounce 2s ease-in-out infinite;
}

@keyframes antenna-bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.header h1 {
  font-size: 1.4rem;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: 2px 2px 0 var(--secondary);
}

.header .tagline {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 0.3rem;
  letter-spacing: 1px;
}

/* ── Signal bars (pixel animation) ─────────────────── */
.signal-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  justify-content: center;
  height: 20px;
  margin-top: 0.8rem;
}
.signal-bars span {
  width: 6px;
  background: var(--primary);
  animation: signal 1s ease-in-out infinite;
}
.signal-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
.signal-bars span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
.signal-bars span:nth-child(3) { height: 18px; animation-delay: 0.2s; }
.signal-bars span:nth-child(4) { height: 14px; animation-delay: 0.3s; }
.signal-bars span:nth-child(5) { height: 8px; animation-delay: 0.4s; }

@keyframes signal {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── Input Section ─────────────────────────────────── */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.input-row {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
}

.pixel-input {
  flex: 1;
  min-width: 160px;
  padding: 0.6rem 0.8rem;
  font-family: inherit;
  font-size: 0.75rem;
  border: 3px solid var(--border);
  background: #fffdf9;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.pixel-input:focus {
  border-color: var(--primary);
  box-shadow: 3px 3px 0 0 var(--secondary);
}
.pixel-input::placeholder {
  color: var(--muted);
  font-size: 0.65rem;
}

/* ── Pixel File Upload ─────────────────────────────── */
.file-upload-wrap {
  position: relative;
}
.file-upload-wrap input[type=file] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
.file-label {
  display: block;
  padding: 0.6rem 0.8rem;
  font-size: 0.7rem;
  border: 3px dashed var(--border);
  background: #fffdf9;
  color: var(--muted);
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.file-label:hover {
  border-color: var(--primary);
  color: var(--text);
}
.file-label.has-file {
  border-style: solid;
  border-color: var(--success);
  color: var(--text);
}

.option-toggle {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.55rem 0.7rem;
  border: 3px solid var(--border);
  background: #fffdf9;
  font-size: 0.68rem;
  color: var(--text);
  cursor: pointer;
}
.option-toggle input {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
}
.option-toggle span {
  line-height: 1.5;
}

/* ── Pixel Button ──────────────────────────────────── */
.pixel-btn {
  padding: 0.7rem 1.6rem;
  font-family: inherit;
  font-size: 0.8rem;
  letter-spacing: 1px;
  cursor: pointer;
  border: none;
  background: var(--primary);
  color: #fff;
  box-shadow: var(--pixel) var(--pixel) 0 0 var(--accent);
  transition: all 0.1s;
  text-transform: uppercase;
  image-rendering: pixelated;
}
.pixel-btn:hover {
  background: #eca389;
  box-shadow: 2px 2px 0 0 var(--accent);
  transform: translate(2px, 2px);
}
.pixel-btn:active {
  box-shadow: 0 0 0 0 var(--accent);
  transform: translate(var(--pixel), var(--pixel));
}
.pixel-btn:disabled {
  background: var(--muted);
  box-shadow: 2px 2px 0 0 #a08070;
  cursor: not-allowed;
  transform: none;
}

.pixel-btn.accent {
  background: var(--accent);
  box-shadow: var(--pixel) var(--pixel) 0 0 #a04030;
}

/* ── Progress Section ──────────────────────────────── */
#progress-section {
  display: none;
}

.step-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.step-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.6rem;
  font-size: 0.7rem;
  border: 2px solid transparent;
  transition: all 0.2s;
}

.step-item .icon {
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  font-size: 0.8rem;
}

.step-item.waiting { color: var(--muted); }
.step-item.waiting .icon::before { content: '⬜'; }
.step-item.running { color: var(--accent); border-color: var(--secondary); background: #fffaf6; }
.step-item.running .icon::before { content: '▶'; animation: blink 0.6s step-end infinite; }
.step-item.done { color: var(--success); }
.step-item.done .icon::before { content: '✅'; }
.step-item.error { color: #d44; }
.step-item.error .icon::before { content: '❌'; }

@keyframes blink {
  50% { opacity: 0; }
}

/* Pixel progress bar */
.progress-bar-outer {
  margin-top: 0.8rem;
  height: 14px;
  border: 3px solid var(--border);
  background: #fffdf9;
  position: relative;
}
.progress-bar-inner {
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    var(--primary) 0px,
    var(--primary) 8px,
    #f0a890 8px,
    #f0a890 10px
  );
  width: 0%;
  transition: width 0.3s step-end;
}
.progress-text {
  font-size: 0.6rem;
  color: var(--muted);
  text-align: right;
  margin-top: 0.2rem;
}

/* ── Output Section ────────────────────────────────── */
#output-section {
  display: none;
}

.script-content {
  font-size: 0.75rem;
  line-height: 1.8;
  max-height: 500px;
  overflow-y: auto;
  padding: 1rem;
  border: 3px solid var(--border);
  background: #fffdf9;
  white-space: pre-wrap;
  word-break: break-word;
}

.script-content::-webkit-scrollbar {
  width: 8px;
}
.script-content::-webkit-scrollbar-track {
  background: var(--card);
}
.script-content::-webkit-scrollbar-thumb {
  background: var(--border);
  border: 2px solid var(--card);
}

/* ── Media Output ──────────────────────────────────── */
#audio-section,
#image-section,
#warning-section {
  display: none;
  margin-top: 1rem;
}

.audio-card,
.image-card,
.warning-card {
  border: 3px solid var(--border);
  background: var(--card);
  padding: 0.8rem 1rem;
}

.audio-card audio {
  width: 100%;
  height: 36px;
  border-radius: 0;
}

.audio-label,
.image-label,
.warning-label {
  font-size: 0.7rem;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
  color: var(--accent);
}

.cover-image {
  display: block;
  width: 100%;
  max-height: 360px;
  object-fit: contain;
  image-rendering: auto;
  border: 3px solid var(--border);
  background: #fffdf9;
}

.warning-card {
  border-color: #d9a45f;
  color: #8a5a21;
  white-space: pre-wrap;
}

.audio-download,
.image-download {
  display: inline-block;
  margin-top: 0.5rem;
  font-size: 0.65rem;
  color: var(--primary);
  text-decoration: none;
  border: 2px solid var(--primary);
  padding: 0.3rem 0.8rem;
  transition: all 0.1s;
}
.audio-download:hover,
.image-download:hover {
  background: var(--primary);
  color: #fff;
}

/* ── Tape animation ────────────────────────────────── */
.tape-container {
  display: none;
  justify-content: center;
  gap: 12px;
  padding: 0.5rem;
}
.tape-container.active { display: flex; }

.tape-reel {
  width: 24px;
  height: 24px;
  border: 3px solid var(--text);
  border-radius: 50%;
  position: relative;
}
.tape-reel::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
.tape-reel.spin {
  animation: spin 2s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ── Pixel confetti ────────────────────────────────── */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 999;
}
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  animation: confetti-fall 2s ease-out forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── Responsive ────────────────────────────────────── */
@media (max-width: 500px) {
  body { padding: 1rem 0.5rem; }
  .pixel-card { padding: 1rem; }
  .header h1 { font-size: 1.1rem; }
  .pixel-btn { font-size: 0.7rem; padding: 0.6rem 1.2rem; }
  .input-row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="pixel-card header">
    <span class="header-icon">🎙️</span>
    <h1>PIXEL RADIO STUDIO</h1>
    <p class="tagline">论文 → 中文播客脚本 · PaperCast Agent</p>
    <div class="signal-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Input -->
  <div class="pixel-card" id="input-card">
    <div class="input-group">
      <div class="input-row">
        <input class="pixel-input" id="arxiv-id" placeholder="🔬 arXiv ID (例: 2401.00000)">
        <input class="pixel-input" id="pdf-url" placeholder="🔗 PDF URL">
      </div>
      <div class="file-upload-wrap">
        <input type="file" id="local-pdf" accept=".pdf">
        <label class="file-label" for="local-pdf" id="file-label">📂 或上传本地 PDF...</label>
      </div>
      <label class="option-toggle" for="fast-mode">
        <input type="checkbox" id="fast-mode">
        <span>快速模式：更快生成脚本，跳过封面和音频</span>
      </label>
      <button class="pixel-btn" id="btn-run" onclick="startPipeline()">
        ▶ 开始生成
      </button>
    </div>
  </div>

  <!-- Tape animation -->
  <div class="tape-container" id="tape">
    <div class="tape-reel spin"></div>
    <div class="tape-reel spin"></div>
  </div>

  <!-- Progress -->
  <div class="pixel-card" id="progress-section">
    <h3 style="font-size:0.8rem;margin-bottom:0.8rem;letter-spacing:1px;">📻 生成进度</h3>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
    <p class="progress-text" id="progress-text">0%</p>
    <ul class="step-list" id="step-list"></ul>
  </div>

  <!-- Output -->
  <div class="pixel-card" id="output-section">
    <h3 style="font-size:0.8rem;margin-bottom:0.8rem;letter-spacing:1px;">📝 播客脚本</h3>
    <div id="warning-section">
      <div class="warning-card">
        <div class="warning-label">⚠️ 媒体提示</div>
        <div id="warning-content"></div>
      </div>
    </div>
    <div id="image-section">
      <div class="image-card">
        <div class="image-label">🖼️ 播客封面</div>
        <img class="cover-image" id="cover-image" alt="播客封面">
        <a class="image-download" id="image-download" href="#" download>⬇ 下载封面</a>
      </div>
    </div>
    <div id="audio-section">
      <div class="audio-card">
        <div class="audio-label">🎧 播客音频</div>
        <audio id="audio-player" controls></audio>
        <a class="audio-download" id="audio-download" href="#" download>⬇ 下载音频</a>
      </div>
    </div>
    <div class="script-content" id="script-content"></div>
  </div>

</div>

<div class="confetti-container" id="confetti"></div>

<script>
const STEPS = [
  { id: '输入解析',  label: '解析论文输入' },
  { id: 'PDF下载',   label: '下载论文 PDF' },
  { id: 'Markdown转换', label: 'PDF → Markdown 转换' },
  { id: '文本分块',  label: '文本智能切分' },
  { id: 'LLM摘要',   label: 'AI 逐段摘要' },
  { id: '生成脚本',  label: '生成播客脚本' },
  { id: '封面生成',  label: '生成播客封面' },
  { id: '音频合成',  label: '合成语音音频' },
];

let eventSource = null;

function initSteps() {
  const list = document.getElementById('step-list');
  list.innerHTML = STEPS.map(s =>
    `<li class="step-item waiting" id="step-${s.id}"><span class="icon"></span>${s.label}</li>`
  ).join('');
}

function updateStep(stepId, status) {
  const el = document.getElementById('step-' + stepId);
  if (!el) return;
  el.className = 'step-item ' + status;
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

function showSection(id) {
  document.getElementById(id).style.display = 'block';
}

function spawnConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#e8957c','#f4c7ab','#d4694a','#7cb88a','#f0c090','#e0b0c0'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDelay = Math.random() * 1 + 's';
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

function startPipeline() {
  const arxivId = document.getElementById('arxiv-id').value.trim();
  const pdfUrl = document.getElementById('pdf-url').value.trim();
  const fileInput = document.getElementById('local-pdf');
  const file = fileInput.files[0];
  const fastMode = document.getElementById('fast-mode').checked;

  if (!arxivId && !pdfUrl && !file) {
    alert('请填写 arXiv ID、PDF URL 或上传 PDF 文件');
    return;
  }

  // Reset UI
  initSteps();
  setProgress(0);
  showSection('progress-section');
  document.getElementById('output-section').style.display = 'none';
  document.getElementById('warning-section').style.display = 'none';
  document.getElementById('image-section').style.display = 'none';
  document.getElementById('audio-section').style.display = 'none';
  document.getElementById('warning-content').textContent = '';
  document.getElementById('script-content').textContent = '';
  document.getElementById('tape').classList.add('active');
  document.getElementById('btn-run').disabled = true;

  // Build form data
  const formData = new FormData();
  if (arxivId) formData.append('arxiv_id', arxivId);
  if (pdfUrl) formData.append('pdf_url', pdfUrl);
  if (file) formData.append('local_pdf', file);
  if (fastMode) formData.append('fast_mode', 'on');

  // Close existing SSE
  if (eventSource) eventSource.close();

  eventSource = new EventSource('/api/run?' + new URLSearchParams({_cb: Date.now()}));

  // POST to start pipeline
  fetch('/api/run', { method: 'POST', body: formData })
    .then(response => {
      if (!response.ok) throw new Error('Server error');
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function read() {
        reader.read().then(({ done, value }) => {
          if (done) {
            document.getElementById('tape').classList.remove('active');
            document.getElementById('btn-run').disabled = false;
            return;
          }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                handleSSE(data);
              } catch(e) {}
            }
          }
          read();
        });
      }
      read();
    })
    .catch(err => {
      updateStep('错误', 'error');
      document.getElementById('tape').classList.remove('active');
      document.getElementById('btn-run').disabled = false;
      alert('请求失败: ' + err.message);
    });
}

function handleSSE(data) {
  const { step, status, message, percent } = data;

  if (step === '错误') {
    updateStep(STEPS.find(s => s.status === 'running')?.id || '输入解析', 'error');
    document.getElementById('tape').classList.remove('active');
    document.getElementById('btn-run').disabled = false;
    const scriptEl = document.getElementById('script-content');
    scriptEl.textContent = '❌ 错误: ' + message;
    showSection('output-section');
    return;
  }

  if (step === '完成') {
    updateStep('生成脚本', 'done');
    setProgress(100);
    document.getElementById('tape').classList.remove('active');
    document.getElementById('btn-run').disabled = false;
    showSection('output-section');
    spawnConfetti();
    // Parse completion data
    try {
      const paths = JSON.parse(message);
      if (paths.warnings && paths.warnings.length) {
        document.getElementById('warning-section').style.display = 'block';
        document.getElementById('warning-content').textContent = paths.warnings.join('\n');
      }
      if (paths.image) {
        document.getElementById('image-section').style.display = 'block';
        document.getElementById('cover-image').src = '/api/image?path=' + encodeURIComponent(paths.image);
        document.getElementById('image-download').href = '/api/image?path=' + encodeURIComponent(paths.image);
      }
      // Load script
      fetch('/api/script?path=' + encodeURIComponent(paths.script))
        .then(r => r.text())
        .then(text => {
          document.getElementById('script-content').textContent = text;
        });
      // Show audio
      if (paths.audio) {
        document.getElementById('audio-section').style.display = 'block';
        document.getElementById('audio-player').src = '/api/audio?path=' + encodeURIComponent(paths.audio);
        document.getElementById('audio-download').href = '/api/audio?path=' + encodeURIComponent(paths.audio);
      }
    } catch(e) {
      // Fallback: old format (just a path string)
      fetch('/api/script?path=' + encodeURIComponent(message))
        .then(r => r.text())
        .then(text => {
          document.getElementById('script-content').textContent = text;
        });
    }
    return;
  }

  updateStep(step, status);
  setProgress(percent);

  if (status === 'done') {
    // Auto-complete all previous steps
    let found = false;
    for (const s of STEPS) {
      if (s.id === step) { found = true; continue; }
      if (!found) updateStep(s.id, 'done');
    }
  }
}

// File upload label update
document.getElementById('local-pdf').addEventListener('change', function() {
  const label = document.getElementById('file-label');
  if (this.files[0]) {
    label.textContent = '📂 ' + this.files[0].name;
    label.classList.add('has-file');
  } else {
    label.textContent = '📂 或上传本地 PDF...';
    label.classList.remove('has-file');
  }
});
</script>
</body>
</html>
